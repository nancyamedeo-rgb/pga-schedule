<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGA Tour Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #04160a;
    --surface:  #0a2614;
    --border:   #1a4a28;
    --gold:     #c9a84c;
    --gold-dim: #7a6030;
    --green:    #2e7d32;
    --green-hi: #4caf50;
    --white:    #f0f4f0;
    --muted:    #7a9e80;
    --upcoming: #e8f5e9;
    --past:     #4a6050;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent !important;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #071f0d 0%, var(--bg) 100%);
    flex-shrink: 0;
  }

  /* LOGO PLACEHOLDER — replace src with your PGA .jpg */
  .logo-wrap {
    width: 110px;
    height: 110px;
    border-radius: 8px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
    position: relative;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none; /* shown once src is set */
  }
  .logo-placeholder-text {
    font-size: 9px;
    color: var(--gold-dim);
    text-align: center;
    line-height: 1.3;
    padding: 4px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .header-text { flex: 1; }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.8rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    line-height: 1;
  }
  .header-sub {
    font-size: 1.6rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-date {
    text-align: right;
    flex-shrink: 0;
  }
  .header-date .day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: var(--green-hi);
    line-height: 1;
  }
  .header-date .month-year {
    font-size: 1.4rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ── COLUMN LABELS ── */
  .col-labels {
    display: grid;
    grid-template-columns: 140px 1fr 180px;
    gap: 0 16px;
    padding: 10px 28px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: transparent;
  }
  .col-label {
    font-size: 1.25rem;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .col-label.right { text-align: right; }

  /* ── SCROLL CONTAINER ── */
  .scroll-outer {
    flex: 1;
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 94%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 6%, black 94%, transparent 100%);
  }

  .scroll-track {
    display: flex;
    flex-direction: column;
    animation: scrollUp var(--scroll-dur, 40s) linear infinite;
  }
  .scroll-track:hover { animation-play-state: paused; }

  @keyframes scrollUp {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  /* ── TOURNAMENT ROW ── */
  .row {
    display: grid;
    grid-template-columns: 140px 1fr 180px;
    gap: 0 16px;
    align-items: center;
    padding: 18px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.2s;
    position: relative;
    background: transparent;
  }

  .row.past   { opacity: 0.42; }
  .row.next   { background: rgba(201,168,76,0.1); }
  .row.next::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--gold);
  }
  .row.major  { background: rgba(106,176,232,0.08); }
  .row.major::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: #6ab0e8;
  }

  .row-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.1rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.1;
  }
  .row.next .row-date   { color: var(--gold); }
  .row.major .row-date  { color: #6ab0e8; }

  .row-name {
    font-size: 1.9rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }
  .row.past .row-name { color: var(--past); }

  .badge {
    display: inline-block;
    font-size: 1.05rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .badge-next  { background: var(--gold); color: #000; }
  .badge-major { background: #6ab0e8; color: #000; }

  .row-status {
    font-size: 1.6rem;
    text-align: right;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .status-upcoming { color: var(--green-hi); }
  .status-past     { color: var(--past); }
  .status-next     { color: var(--gold); }

  /* ── FOOTER ── */
  .footer {
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: transparent;
  }
  .footer-note {
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-hi);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  /* full-page flex */
  body { display: flex; flex-direction: column; }
</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header class="header">

  <!-- 🔧 TO ADD YOUR PGA LOGO:
       1. Place your .jpg next to this HTML file (e.g. pga_logo.jpg)
       2. Set img src="pga_logo.jpg" below
       3. Remove the logo-placeholder-text div
  -->
  <div class="logo-wrap">
    <img src="pga_logo.jpg" alt="PGA Tour Logo" id="pga-logo">
    <div class="logo-placeholder-text" id="logo-hint">PGA<br>LOGO<br>HERE</div>
  </div>

  <div class="header-text">
    <div class="header-title">PGA Tour Schedule</div>
    <div class="header-sub">2025–2026 Season &nbsp;·&nbsp; All times Thursday tee-off</div>
  </div>

  <div class="header-date">
    <div class="day" id="live-day">—</div>
    <div class="month-year" id="live-month">—</div>
  </div>
</header>

<!-- ══════════ COLUMN LABELS ══════════ -->
<div class="col-labels">
  <span class="col-label">Date</span>
  <span class="col-label">Tournament</span>
  <span class="col-label right">Status</span>
</div>

<!-- ══════════ SCROLLING LIST ══════════ -->
<div class="scroll-outer">
  <div class="scroll-track" id="track"></div>
</div>

<!-- ══════════ FOOTER ══════════ -->
<footer class="footer">
  <span class="footer-note"><span class="pulse"></span>Live Display</span>
  <span class="footer-note">Source: PGA Tour / SportRadar</span>
</footer>

<script>
// ── Tournament data (fetched live) ──
const TOURNAMENTS = [
  { date: "Jan 15", name: "Sony Open in Hawaii"},
  { date: "Jan 22", name: "The American Express"},
  { date: "Jan 29", name: "Farmers Insurance Open"},
  { date: "Feb 5",  name: "WM Phoenix Open"},
  { date: "Feb 12", name: "AT&T Pebble Beach Pro-Am"},
  { date: "Feb 19", name: "The Genesis Invitational"},
  { date: "Feb 26", name: "Cognizant Classic in The Palm Beaches"},
  { date: "Mar 5",  name: "Arnold Palmer Invitational pres. by Mastercard"},
  { date: "Mar 5",  name: "Puerto Rico Open"},
  { date: "Mar 12", name: "THE PLAYERS Championship", major: true   },
  { date: "Mar 19", name: "Valspar Championship"},
  { date: "Mar 26", name: "Texas Children's Houston Open"},
  { date: "Apr 2",  name: "Valero Texas Open"},
  { date: "Apr 9",  name: "Masters Tournament", major: true   },
  { date: "Apr 16", name: "RBC Heritage"},
  { date: "Apr 23", name: "Zurich Classic of New Orleans"},
  { date: "Apr 30", name: "Cadillac Championship"},
  { date: "May 7",  name: "Truist Championship"},
  { date: "May 7",  name: "ONEflight Myrtle Beach Classic"},
  { date: "May 14", name: "PGA Championship", major: true   },
  { date: "May 21", name: "Charles Schwab Challenge"},
  { date: "May 28", name: "Memorial Tournament pres. by Workday"},
  { date: "Jun 11", name: "RBC Canadian Open"},
  { date: "Jun 18", name: "U.S. Open", major: true },
  { date: "Jun 25", name: "Travelers Championship"},
  { date: "Jul 2",  name: "John Deere Classic"},
  { date: "Jul 9",  name: "Genesis Scottish Open"},
  { date: "Jul 9",  name: "ISCO Championship"},
  { date: "Jul 16", name: "The Open Championship", major: true },
  { date: "Jul 16", name: "Corales Puntacana Championship"},
  { date: "Jul 23", name: "3M Open"},
  { date: "Jul 30", name: "Rocket Mortgage Classic"},
  { date: "Aug 6",  name: "Wyndham Championship"},
  { date: "Aug 13", name: "FedEx St. Jude Championship"},
  { date: "Aug 20", name: "BMW Championship"},
  { date: "Aug 27", name: "TOUR Championship"},
];

// ── Dynamically compute status from today's date ──
// Each tournament's date string ("Jun 18", "Jul 2", etc.) is parsed against
// the current year. A tournament is considered "past" once 4 days have elapsed
// from its Thursday start (i.e. the following Monday), giving the full weekend.
function computeRows() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const YEAR = today.getFullYear();

  const processed = TOURNAMENTS.map(t => {
    const parsed = new Date(`${t.date} ${YEAR}`);
    // If the date string is in a month earlier than today's month and we're
    // past August, it's likely next year (handles Jan–Aug season boundary).
    // For a Jan–Aug season this simple approach works fine.
    const endOfTournament = new Date(parsed);
    endOfTournament.setDate(endOfTournament.getDate() + 4); // Mon after Thu start
    const isPast = endOfTournament < today;
    return { ...t, status: isPast ? 'past' : 'upcoming' };
  });

  // Drop past tournaments entirely — only current/upcoming remain
  const upcomingOnly = processed.filter(t => t.status !== 'past');

  // Mark the first remaining tournament as "next"
  let markedNext = false;
  return upcomingOnly.map(t => {
    if (!markedNext) {
      markedNext = true;
      return { ...t, next: true };
    }
    return t;
  });
}

const rows = computeRows();

// ── Live date ──
function updateClock() {
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  const parts = now.toLocaleDateString('en-US', opts).split(', ');
  document.getElementById('live-day').textContent  = now.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase() + ' ' + now.getDate();
  document.getElementById('live-month').textContent = now.toLocaleDateString('en-US',{month:'long'}) + ' ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 60000);

// ── Daily refresh at midnight ──
// Calculates ms until next midnight and reloads the page then,
// so "past / upcoming / next" statuses stay accurate day-to-day.
function scheduleMidnightRefresh() {
  const now = new Date();
  const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
  const msUntilMidnight = nextMidnight - now;
  console.log(`[PGA Widget] Next refresh in ${Math.round(msUntilMidnight / 60000)} min`);
  setTimeout(() => { location.reload(); }, msUntilMidnight);
}
scheduleMidnightRefresh();

// ── Logo swap helper ──
// If img src is set by operator, show img and hide placeholder text
const logoImg = document.getElementById('pga-logo');
if (logoImg.src && !logoImg.src.endsWith('/')) {
  logoImg.style.display = 'block';
  document.getElementById('logo-hint').style.display = 'none';
}

// ── Build rows (doubled for seamless loop) ──
function buildRows() {
  const track = document.getElementById('track');
  track.innerHTML = '';

  function makeRowHTML(t) {
    let cls = 'row';
    if (t.next)                  cls += ' next';
    if (t.major && !t.next)      cls += ' major';

    const dateLine = t.date.replace('\n', '<br>');
    let nameLine = t.name;
    if (t.next)  nameLine += ' <span class="badge badge-next">Next</span>';
    if (t.major && !t.next) nameLine += ' <span class="badge badge-major">Major</span>';

    let statusLabel = '';
    let statusClass = '';
    if (t.next) { statusLabel = 'Up Next'; statusClass = 'status-next'; }
    else        { statusLabel = 'Upcoming'; statusClass = 'status-upcoming'; }

    return `<div class="${cls}">
      <div class="row-date">${dateLine}</div>
      <div class="row-name">${nameLine}</div>
      <div class="row-status ${statusClass}">${statusLabel}</div>
    </div>`;
  }

  // Double the list so the loop is seamless
  const html = rows.map(makeRowHTML).join('') + rows.map(makeRowHTML).join('');
  track.innerHTML = html;

  // Set scroll speed: ~5s per row
  const totalRows = rows.length;
  const rowHeight = 44; // px approx
  const duration = totalRows * 5;
  track.style.setProperty('--scroll-dur', duration + 's');
  document.documentElement.style.setProperty('--scroll-dur', duration + 's');
}

buildRows();
</script>
</body>
</html>
